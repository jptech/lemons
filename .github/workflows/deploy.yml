name: Deploy to GitHub Pages

on:
  # Publish on every push to the default branch.
  push:
    branches: [main]
  # Allow manual re-runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token scopes required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two publishes at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Quality gates — match the repo standard; a red gate blocks the deploy.
      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build static site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
